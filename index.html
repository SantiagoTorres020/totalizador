<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Totalizador</title>
</head>
<body>
    <h1>Totalizador</h1>

    <form id="totalizar-form">
        <p>Cantidad de items:</p>
        <input type="number" id="txtCantidad" min="1" required />

        <p>Precio por item:</p>
        <input type="number" id="txtPrecio" min="1" required />

        <p>Codigo de estado:</p>
        <select id="txtEstado" required>
            <option value="CA" selected>CA</option>
            <option value="UT">UT</option>
            <option value="NV">NV</option>
            <option value="TX">TX</option>
            <option value="AL">AL</option>
        </select>

        <p>Categoria de producto:</p>
        <select id="txtCategoria">
            <option value="Varios" selected>Varios</option>
            <option value="Alimentos">Alimentos</option>
            <option value="Bebidas alcohólicas">Bebidas alcohólicas</option>
            <option value="Material de escritorio">Material de escritorio</option>
            <option value="Muebles">Muebles</option>
            <option value="Electrónicos">Electrónicos</option>
            <option value="Vestimenta">Vestimenta</option>
        </select>

        <p>Peso volumétrico por unidad:</p>
        <input type="number" id="txtPesoVolumetrico" min="1" required />

        <p>Tipo de cliente:</p>
        <select id="txtTipoCliente" required>
            <option value="Normal" selected>Normal</option>
            <option value="Recurrente">Recurrente</option>
            <option value="Antiguo Recurrente">Antiguo Recurrente</option>
            <option value="Especial">Especial</option>
        </select>

        <br /><br />
        <button type="submit">Totalizar</button>
    </form>

    <div id="resultado"></div>

    <script type="module" src="./src/presenter.js"></script>
</body>
</html>
