<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Totalizador</title>
  </head>
  <body>
    <h1>Totalizador</h1>

    <form id="totalizar-form">
      <p>Cantidad de items:</p>
      <input type="number" id="txtCantidad" />

      <p>Precio por item:</p>
      <input type="number" id="txtPrecio" />

      <p>Codigo de estado (UT, NV, TX, AL, CA):</p>
      <input type="text" id="txtEstado" />

      <br /><br />
      <button type="submit">Totalizar</button>
    </form>

    <div id="resultado"></div>

    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
